<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="HUGOFXLAB — AI Agentų Platforma. Kurkite, paleiskite ir valdykite AI darbo srautus.">
  
  <title>HUGOFXLAB — AI Agentų Platforma</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%234f8ef7'/><stop offset='100%25' stop-color='%236c5ce7'/></linearGradient></defs><rect width='32' height='32' rx='8' fill='url(%23g)'/><text x='16' y='22' text-anchor='middle' font-family='sans-serif' font-weight='bold' font-size='14' fill='white'>N</text></svg>">
  
  <!-- Styles -->
  <link rel="stylesheet" href="index.css">
  <!-- Monaco Loader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
</head>
<body>
  <div id="app">

    <!-- Top Bar -->
    <header class="topbar" id="topbar" role="banner"></header>
    
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar" role="navigation" aria-label="Pagrindinė navigacija"></nav>
    
    <!-- Main Canvas -->
    <main class="canvas" id="canvas" role="main">
      <div class="canvas__content">
        <div class="loader-container">
          <div class="spinner spinner--lg"></div>
          <div class="loader-text">Kraunama HUGOFXLAB...</div>
        </div>
      </div>
    </main>
    
    <!-- Inspector Panel -->
    <aside class="inspector" id="inspector" role="complementary" aria-label="Inspektorius"></aside>
    
    <!-- Status Bar -->
    <footer class="statusbar" id="statusbar" role="status"></footer>
  </div>

  <!-- Charts are rendered by our own dependency-free canvas module (no CDN/branding). -->
  <script type="module" src="app.js"></script>
</body>
</html>
